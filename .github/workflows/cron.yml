name: Colab Cron Replacement

on:
  schedule:
    - cron: "*/30 * * * *"    # Runs every 30 minutes (recommended for stability)
  workflow_dispatch:          # Allows manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install tensorflow keras pillow

      - name: Run Deepfake Training Script
        run: python script.py train --data "Dataset for MLDL" --epochs 8 --validation-split 0.2

      - name: Show training output
        run: |
          echo "=== Training completed ==="
          ls -la artifacts/ || echo "Artifacts folder not found"
          echo "Check the logs above for model training details."

      - name: Upload model as artifact (optional)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deepfake-model
          path: artifacts/
          retention-days: 7