name: Colab Cron Replacement

on:
  schedule:
    - cron: "*/8 * * * *"   # every 8 minutes
  workflow_dispatch:         # manual trigger button

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run script
        run: python script.py

      - name: Show log output
        run: cat log.txt